name: Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-cpu-wheel:
    name: Build CPU wheel (pure-Python fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-cpu
          path: dist/*

  build-cuda-wheels:
    name: Build wheel for ${{ matrix.cuda }} / torch ${{ matrix.torch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: cu121
            torch: "2.4.1+cu121"
          - cuda: cu128
            torch: "2.7.0+cu128"
          - cuda: cu130
            torch: "2.9.0+cu130"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install torch for CUDA target
        run: |
          pip install torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda }}
      - name: Build wheel
        run: |
          pip install build tomli
          # Stamp the local version with the CUDA tag (PEP 440: 0.2.0+cu121)
          python - <<'EOF'
          import re, pathlib
          p = pathlib.Path("pyproject.toml")
          txt = p.read_text()
          txt = re.sub(r'(^version\s*=\s*")([^"]+)(")', r'\g<1>\g<2>+${{ matrix.cuda }}\g<3>', txt, flags=re.MULTILINE)
          p.write_text(txt)
          EOF
          python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-${{ matrix.cuda }}
          path: dist/*

  publish:
    name: Publish to PyPI on tag
    needs: [build-cpu-wheel, build-cuda-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/anvil-eval
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Show artifacts
        run: ls -lh dist/
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
