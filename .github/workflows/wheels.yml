name: Wheels

# Multi-CUDA wheel matrix per design §9.1. Triggered on tags + manual.
# The cu121/cu128/cu130 jobs each pin to the matching torch wheel and
# build Anvil against it; the CPU fallback is pure-Python.
#
# This workflow is *prepared* but not exercised in the agent's build
# session — running it requires self-hosted CI infrastructure with the
# right CUDA toolchains. It documents the release pipeline so a human
# maintainer can run it once the infra is in place.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-cpu-wheel:
    name: Build CPU wheel (pure-Python fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Build sdist + wheel
        run: |
          uv venv
          uv pip install build
          uv run python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-cpu
          path: dist/*

  build-cuda-wheels:
    name: Build wheel for ${{ matrix.cuda }} / torch ${{ matrix.torch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: cu121
            torch: "2.4.1+cu121"
          - cuda: cu128
            torch: "2.6.0+cu128"
          - cuda: cu130
            torch: "2.8.0+cu130"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install torch matching the CUDA target
        run: |
          uv venv
          uv pip install torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda }}
      - name: Build wheel
        run: |
          uv pip install build
          uv run python -m build --wheel
      - name: Rename wheel with CUDA tag
        run: |
          for w in dist/*.whl; do
            mv "$w" "${w%.whl}-${{ matrix.cuda }}.whl"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-${{ matrix.cuda }}
          path: dist/*

  publish:
    name: Publish to PyPI on tag
    needs: [build-cpu-wheel, build-cuda-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Publish (trusted-publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
