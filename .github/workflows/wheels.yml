name: Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-cpu-wheel:
    name: Build CPU wheel (pure-Python fallback)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-cpu
          path: dist/*

  build-cuda-wheels:
    name: Build wheel for ${{ matrix.cuda }} / torch ${{ matrix.torch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda: cu121
            torch: "2.4.1+cu121"
          - cuda: cu128
            torch: "2.7.0+cu128"
          - cuda: cu130
            torch: "2.9.0+cu130"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install torch for CUDA target
        run: |
          pip install torch==${{ matrix.torch }} \
            --index-url https://download.pytorch.org/whl/${{ matrix.cuda }}
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel
      - name: Rename wheel with CUDA suffix for GitHub Releases
        # PyPI forbids PEP 440 local versions (+cuXXX), so we rename only for
        # the GitHub Release asset name. The rename uses a plain dash suffix
        # (not a + local version) so it's clear but not a valid wheel tag —
        # users install via: pip install <url-to-this-whl>
        run: |
          cd dist
          for f in *.whl; do
            mv "$f" "${f%.whl}-${{ matrix.cuda }}.whl"
          done
          ls -lh
      - uses: actions/upload-artifact@v4
        with:
          name: anvil-${{ matrix.cuda }}
          path: dist/*.whl

  publish-pypi:
    name: Publish CPU wheel + sdist to PyPI
    needs: [build-cpu-wheel, build-cuda-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/anvil-eval
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          # Only the CPU artifact (sdist + pure wheel) goes to PyPI.
          # CUDA wheels go to GitHub Releases (PyPI forbids local versions).
          name: anvil-cpu
          path: dist
      - name: Show artifacts
        run: ls -lh dist/
      - name: Publish (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github-release:
    name: Attach CUDA wheels to GitHub Release
    needs: [build-cpu-wheel, build-cuda-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist
      - name: Upload CUDA wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*-cu*.whl
